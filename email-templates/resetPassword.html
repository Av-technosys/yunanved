<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password - Yunanved</title>
    <style>
      @media screen and (min-width: 600px) {
        .container {
          width: 600px !important;
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif;
    "
  >
    <center>
      <table
        role="presentation"
        border="0"
        cellpadding="0"
        cellspacing="0"
        width="100%"
        style="background-color: #f7f9f9; border-bottom: 1px solid #eeeeee"
      >
        <tr>
          <td align="center" style="padding: 15px 0">
            <span
              style="
                font-size: 18px;
                color: #0b1320;
                font-weight: 800;
                letter-spacing: 0.5px;
              "
              >Security Center</span
            >
          </td>
        </tr>
      </table>

      <table
        role="presentation"
        border="0"
        cellpadding="0"
        cellspacing="0"
        width="100%"
        class="container"
        style="max-width: 500px; background-color: #ffffff; text-align: center"
      >
        <tr>
          <td style="padding: 40px 20px">
            <div style="margin-bottom: 30px">
              <div
                style="
                  display: inline-block;
                  width: 100px;
                  height: 100px;
                  background-color: #f6efe0;
                  border-radius: 50%;
                "
              >
                <img
                  src="https://ik.imagekit.io/avtechnosys/yunanved/resetIcon1.png"
                  alt="Order Cancelled"
                  width="50"
                  style="margin-top: 25px"
                />
              </div>
            </div>


            <h1
              style="
                font-size: 32px;
                color: #0b1320;
                margin: 0 0 15px 0;
                font-weight: 800;
              "
            >
              Reset Your Password
            </h1>

            <p
              style="
                font-size: 15px;
                color: #5a6a85;
                line-height: 1.6;
                margin: 0 0 35px 0;
              "
            >
              We received a request to reset your password for your Yunanved
              account. Please enter your new credentials below.
            </p>

            <div style="text-align: left; margin-bottom: 30px">
              <label
                style="
                  display: block;
                  font-size: 14px;
                  font-weight: 600;
                  color: #0b1320;
                  margin-bottom: 8px;
                "
                >New Password</label
              >
              <div
                style="
                  border: 1px solid #e2e8f0;
                  border-radius: 12px;
                  padding: 12px 16px;
                  margin-bottom: 20px;
                  display: flex;
                  align-items: center;
                "
              >
                <img
                  src="https://ik.imagekit.io/avtechnosys/yunanved/resetIcon2.png"
                  width="18"
                  style="margin-right: 12px; opacity: 0.6"
                />
                 <input placeholder="Enter New Password"  style="color: #0b1320; letter-spacing: 2px ; outline: none; border: none ; width: 100%;">
                
                <div style="margin-left: auto">
                  <img
                    src="https://ik.imagekit.io/avtechnosys/yunanved/resetIcon3.png"
                    width="18"
                    style="opacity: 0.6"
                  />
                </div>
              </div>

              <label
                style="
                  display: block;
                  font-size: 14px;
                  font-weight: 600;
                  color: #0b1320;
                  margin-bottom: 8px;
                "
                >Confirm New Password</label
              >
              <div
                style="
                  border: 1px solid #e2e8f0;
                  border-radius: 12px;
                  padding: 12px 16px;
                  margin-bottom: 25px;
                  display: flex;
                  align-items: center;
                "
              >
                <img
                  src="https://ik.imagekit.io/avtechnosys/yunanved/resetIcon4.png"
                  width="18"
                  style="margin-right: 12px; opacity: 0.6"
                />
                
                <input placeholder="Enter Confirm Password"  style="color: #0b1320; letter-spacing: 2px ; outline: none; border: none; width: 100% ">
                <div style="margin-left: auto">
                  <img
                    src="https://ik.imagekit.io/avtechnosys/yunanved/resetIcon3.png"
                    width="18"
                    style="opacity: 0.6"
                  />
                </div>
              </div>
            </div>

            <div style="margin-bottom: 25px">
              <a
                href="#"
                style="
                  display: block;
                  background-color: #d4a017;
                  color: #ffffff;
                  padding: 18px;
                  text-decoration: none;
                  border-radius: 40px;
                  font-weight: bold;
                  font-size: 18px;
                "
              >
                Reset Password
              </a>
            </div>

            <p style="font-size: 13px; color: #7f8c8d; margin: 0">
              Didn't request this?<br />
              <a
                href="mailto:support@yunanved.com"
                style="color: #d4a017; text-decoration: none; font-weight: bold"
                >Contact Support</a
              >
            </p>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
