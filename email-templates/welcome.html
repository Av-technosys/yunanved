<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Yunanved</title>

    <style>
      @media screen and (min-width: 600px) {
        .container {
          width: 600px !important;
        }
      }
    </style>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif;
    "
  >
    <center>
      <!-- Header -->
      <div
        style="
          background-color: #f8f9fa;
          border-bottom: 1px solid #eeeeee;
          padding: 15px 0;
          text-align: center;
          width: 100%;
        "
      >
        <span
          style="
            font-size: 18px;
            color: #0b1320;
            font-weight: 700;
            letter-spacing: 0.5px;
          "
        >
          Success
        </span>
      </div>

      <!-- Container -->
      <div
        class="container"
        style="
          max-width: 500px;
          background-color: #ffffff;
          text-align: center;
          margin: auto;
        "
      >
        <div style="padding: 40px 20px">
          <!-- Icon -->
          <div
            style="
              width: 90px;
              height: 90px;
              background-color: #f6efe0;
              border-radius: 50%;
              margin: 0 auto 20px auto;
              line-height: 90px;
            "
          >
            <img
              src="https://ik.imagekit.io/avtechnosys/yunanved/welcome1.png"
              width="36"
              style="vertical-align: middle"
            />
          </div>

          <h1
            style="
              font-size: 32px;
              color: #0b1320;
              margin: 0 0 20px 0;
              font-weight: 700;
            "
          >
            Welcome to Yunanved
          </h1>

          <p
            style="
              font-size: 16px;
              color: #5a6a85;
              line-height: 1.6;
              margin: 0 0 40px 0;
            "
          >
            Hi <span style="color: #d4a017; font-weight: bold">Alex</span>, your
            account has been successfully created. Your journey starts here!
          </p>

          <!-- Start Shopping Button -->
          <div style="margin-bottom: 15px">
            <a
              href="#"
              style="
                display: block;
                background-color: #d7b36a;
                color: #ffffff;
                padding: 18px;
                text-decoration: none;
                border-radius: 40px;
                font-weight: bold;
                font-size: 18px;
              "
            >
              <img
                src="https://ik.imagekit.io/avtechnosys/yunanved/welcome2.png"
                width="20"
                style="vertical-align: middle; margin-right: 10px"
              />

              Start Shopping
            </a>
          </div>

          <!-- Explore Categories -->
          <div style="margin-bottom: 40px">
            <a
              href="#"
              style="
                display: block;
                border: 1px solid #d7b36a;
                color: #d7b36a;
                padding: 18px;
                text-decoration: none;
                border-radius: 40px;
                font-weight: bold;
                font-size: 18px;
              "
            >
              <img
                src="https://ik.imagekit.io/avtechnosys/yunanved/welcome3.png"
                width="18"
                style="vertical-align: middle; margin-right: 10px"
              />

              Explore Categories
            </a>
          </div>

          <p
            style="
              font-size: 13px;
              color: #7f8c8d;
              line-height: 1.5;
              margin: 0;
              padding: 0 20px;
            "
          >
            If you have any questions, feel free to reach us at<br />

            <a
              href="mailto:support@yunanved.com"
              style="color: #d4a017; text-decoration: none; font-weight: bold"
            >
              support@yunanved.com
            </a>
          </p>
        </div>
      </div>
    </center>
  </body>
</html>
